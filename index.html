        <!-- english language -->
        <html lang="en">
        <!-- head section & css link -->
                    <head>
                        <link rel="stylesheet" href="hw1.css"> <!-- links to css file-->
                        <title> New Patient Registry | Cat Medical </title>
                    </head>
                    <body>
                        <header>
                            <table width="100%">
                                <tr>
                                    <td valign="top" align="left" width="20%">
                                    <div class="image">
                                        <img align="center" src="CatMedical.jpeg" alt="Cat Medical" width="70px" id="logo"/>
                                    </div>
                                    </td>

                                    <td>
                                    <h2>Cat Medical</h2> 
                                    </td>

                                    <td valign="bottom" align="right" width="20%">
                                        <p>Today's Date: <span id="today"></span></p><!-- writes date-->
                                    </td>
                                </tr>
                            </table>
                        </header>
                    <hr>

        <!-- Form Starts-->
                    <form action="thankyou.html">
                        <center>
                            <div class="format">
                                <table>
                                    <tr>
                                        <th colspan="4">Create Patient Portal Account</th>   <!-- Patient Account Info section starts-->
                                    </tr>


                        

                                        <!-- Patient Name (F,M,L)-->
                                        
                                      <tr>
                                         <td class="td1"><label for="fname">First Name:</label></td>
                                            <td>
                                              <input type="text" 
                                                name="fname" 
                                                id="fname" 
                                                maxlength="30" 
                                                required 
                                                placeholder="Sydney"/>
                                            </td>
                                        </tr>
                                <tr>
                                    <td><label for="mname">Middle Initial:</label></td>
                                    <td>
                                        <input type="text" 
                                        name="mname" 
                                        id="mname" 
                                        maxlength="1" (change)
                                        title="Please enter your middle inital" 
                                        required 
                                        placeholder="R"/>
                                    </td>
                                        
                                    </tr> 

                                    <tr>
                                    
                                    <td><label for="lname">Last Name:</label></td>
                                    <td>
                                        <input type="text" 
                                        name="lname" 
                                        id="lname" 
                                        maxlength="30" (change)
                                        title="Please enter your last name" 
                                        required 
                                        placeholder="Guico"
                                        />
                                
                                    </td>
                                    </tr>


                <!-- Patient Sex -->

                <tr>
                    <td> <label for= "psex">Patient's Sex: </label></td>
                    <td>
                        <input 
                        type="radio" 
                        id="s1" 
                        name="psex" 
                        value="male"
                        /> 
                        Male
                        
                        <input 
                        type="radio" 
                        id="s2" 
                        name="psex" 
                        value="female"
                        /> 
                        Female

                         <input 
                        type="radio" 
                        id="s3" 
                        name="psex" 
                        value="Other"
                        /> 
                        Other

                        <input 
                        type="radio" 
                        id="s4" 
                        name="psex" 
                        value="I prefer not to say"
                        /> 
                        I prefer not to say             
                    </td>
                </tr>

                <!-- D.O.B-->
                 <tr>
            <td><label for="dob">Date of Birth:</label></td>
                <td>
                    <input 
                    type="date" 
                    id="dob" 
                    name="dob"
                    />
                 </td>
            </tr>

                <!-- SSN-->
            <tr>
                <td><label for="ssn">Social Security Number:</label></td>
                <td>
                    <input 
                    type="password" 
                    minlength="9" 
                    maxlength="11" 
                    name="ssn"
                    id="ssn" 
                    required 
                    title="Please enter your social security number DO NOT ENTER YOUR SSN" 
                    placeholder="123-88-4321"
                    />
                    </td>
                </tr> 

                 <!-- INSERT LINE -->
                <tr>
                    <th colspan="4"><th></th>
                </tr>

            <!-- Address -->
            <tr>
                <td> <label for="address1">Address 1:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="address1" 
                    id="address1" 
                    maxlength="30" 
                    title="Please enter your address"
                    required 
                    placeholder="3333 Address"
                    />
                </td>
            </tr>
            </tr>
                <td><label for="address2">Address 2:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="address2" 
                    id="address2" 
                    maxlength="30" 
                    title="Please enter your address"
                    required 
                    placeholder="2222 Address"
                    />
                </td>
            </tr>

            <tr> <!-- city -->
                    <td><label for="city">City:</label></td>
                    <td>
                    <input
                        type="text" 
                        name="city" 
                        id="city" 
                        maxlength="30" 
                        title="Enter your city" 
                        required 
                        placeholder="Please enter your city"
                        />
                </td>
            </tr>   

            <!-- All the states including DC and PR -->
            <tr> 
                <td><label for="state">State:</label></td>
                    <td>
                        <select>
                        <option selected disabled>Please Select One</option>
                        <option value="AL">Alabama</option>
                        <option value="AK">Alaska</option>
                        <option value="AZ">Arizona</option>
                        <option value="AR">Arkansas</option>
                        <option value="CA">California</option>
                        <option value="CO">Colorado</option>
                        <option value="CT">Connecticut</option>
                        <option value="DE">Delaware</option>
                        <option value="DC">District of Columbia</option>
                        <option value="FL">Florida</option>
                        <option value="GA">Georgia</option>
                        <option value="GU">Guam</option>	
                        <option value="HI">Hawaii</option>	
                        <option value="ID">Idaho</option>	
                        <option value="IL">Illinois</option>	
                        <option value="IN">Indiana</option>	
                        <option value="IA">Iowa</option>	
                        <option value="KS">Kansas</option>	
                        <option value="KY">Kentucky</option>	
                        <option value="LA">Louisiana</option>	
                        <option value="ME">Maine</option>	
                        <option value="MD">Maryland</option>	
                        <option value="MA">Massachusetts</option>	
                        <option value="MI">Michigan</option>	
                        <option value="MN">Minnesota</option>	
                        <option value="MS">Mississippi</option>	
                        <option value="MO">Missouri</option>
                        <option value="MT">Montana</option>
                        <option value="NE">Nebraska</option>
                        <option value="NV">Nevada</option>	
                        <option value="NH">New Hampshire</option>	
                        <option value="NJ">New Jersey</option>	
                        <option value="NM">New Mexico</option>	
                        <option value="NY">New York</option>	
                        <option value="NC">North Carolina</option>	
                        <option value="ND">North Dakota</option>	
                        <option value="OH">Ohio</option>	
                        <option value="OK">Oklahoma</option>	
                        <option value="OR">Oregon</option>	
                        <option value="PA">Pennsylvania</option>	
                        <option value="PR">Puerto Rico</option>	
                        <option value="RI">Rhode Island</option>	
                        <option value="SC">South Carolina</option>	
                        <option value="SD">South Dakota</option>	
                        <option value="TN">Tennessee</option>	
                        <option value="TX">Texas</option>	
                        <option value="UT">Utah</option>	
                        <option value="VT">Vermont</option>	
                        <option value="VA">Virginia</option>	
                        <option value="WA">Washington</option>	
                        <option value="WV">West Virginia</option>	
                        <option value="WI">Wisconsin</option>	
                        <option value="WY">Wyoming</option>	
                        </select>
                    </td>
                </tr>

                <tr> <!-- zip code -->
                    <td><label for="zcode">Zip Code:</label></td>
                    <td>
                    <input
                        type="text" 
                        name="zcode" 
                        id="zcode" 
                        maxlength="5" 
                        pattern="[0-9]{5}"
                        title="Enter your zip code" 
                        required 
                        placeholder="Enter zip code"
                        />
                </td>
            </tr>  

            </tr>  <!-- email -->
                <td><label for="email">Email Address:</label></td>
                <td>
                    <input type="text"
                    name="email"
                    id="email"
                    required
                    maxlength="30"
                    title="Please enter your email"
                    placeholder="sydneyguico.tp@gmail.com"
                    />
                </td>
            </tr>

            <tr>  <!-- phone number -->
                <td><label for="phone">Phone Number:</label></td>
                        <td>
                            <input type="text"
                            name="phone"
                            id="phone"
                            pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                            required
                            maxlength="12"
                            title="Please enter your phone number"
                            required
                            placeholder="333-333-3333"
                            />
                        </td>
                </tr>

                 <!-- INSERT LINE -->
                <tr>
                    <th colspan="4"><hr></th>
                </tr>

                <!-- Patient Background RADIO BOXES-->
                
                <tr>
                    <th colspan="4">Patient's History</th>
                </tr>

                 <tr>  <!-- RADIO BOXES-->
                    <td class="td1"><label for="vacc"> Have you been vaccinated:</label></td>
                    <td>
                        <input
                        type="radio"
                        id="v1"
                        name="vaccinated"
                        value="Yes"
                        />
                        Yes
                        <input
                        type="radio"
                        id="v2"
                        name="vaccinated"
                        value="No"
                        />
                        No
                        </td>
                     </tr>

                 <tr>
                    <td class="td1"><label for="vacc"> Do you have insurance:</label></td>
                    <td>
                        <input
                        type="radio"
                        id="i1"
                        name="insurance"
                        value="Yes"
                        />
                        Yes
                        <input
                        type="radio"
                        name="insurance"
                        id="i2"
                        name="vacc"
                        value="No"
                        />
                        No
                        </td>
                     </tr>

                     <tr> <!-- History Checkboxes -->
                        <td class="td1"><label for="past_history"> Have you had:</label></td>
                        <td>
                                
                                <input type="checkbox" id="option1" value="Covid-19"> Covid-19

                                <input type="checkbox" id="option2" value="Chicken Pox"> Chicken Pox

                                <input type="checkbox" id="option3" value="Asthma"> Asthma

                                <input type="checkbox" id="option4" value="Stroke"> Measles

                                <input type="checkbox" id="option5" value="Pneumonia"> Pneumonia

                                <input type="checkbox" id="option6" value="Tetanus"> Tetanus
                        </tr>

                         <!-- ALIGN & Describe Symptoms-->
                        <header>
                                    <td class="td1" align="right" 
                                        <label for="notes">Describe your current symptoms: </label>
                                        </td>
                                
                                       <td>
                                            <textarea 
                                            
                                            rows="3"
                                            cols="50" 
                                            maxlength="500"
                                            id="notes" 
                                            name="notes" 
                                            title="Please write a description on the Symptoms your experiencing..."
                                            placeholder="(Please explain)"
                                            ></textarea>
                                            <span id="description text"></span>
                                        </td>
                                    </tr>


                        <!-- SLIDER HTML CODE -->
                         <tr>
                            <td class="td1"><label for="range">How is your health?<br/>(On a scale of 1 to 10, 10 being feeling good)</label></td>
                            <td>
                                <input
                                type="range"
                                name="range"
                                id="range"
                            min="0"
                            max="10"
                            value="0"
                            />
                            <span id="range-slider"></span>
                            </td>
                        </tr>

                        <!-- INSERT LINE Webpage split-->
                        <tr>
                            <th colspan="4"><hr></th>
                        </tr>

                        <!-- Patient Account Login -->
                        <tr>
                            <td class="td1"><label for="username">Username:</label></td>
                                            <td>
                                                <input
                                                type="text"
                                                name="username"
                                                id="username"
                                                maxlength="20"
                                                required
                                                title="Please enter a username:"
                                                placeholder="Whatever you want"
                                                />
                                            </td>
                                        </tr>

                                        </tr>
                                            <td class="td1"><label for="pass">Password:</label></td>
                                            <td>
                                                <input
                                                type="password"
                                                name="pass"
                                                id="pass"
                                                maxlength="30"
                                                required
                                                title="Please enter a Password:"
                                                placeholder="Enter password"
                                                />
                                            </td>
                                        </tr>

                                        </tr>
                                            <td class="td1"><label for="c_pass">Confrim Password:</label></td>
                                            <td>
                                                <input
                                                type="password"
                                                name="pass"
                                                id="pass"
                                                maxlength="30"
                                                required
                                                title="Please re-enter your Password:"
                                                placeholder="Re-enter password"
                                                />
                                            </td>
                                        </tr>

                                        <tr>
                                            <td colspan="4">
                                                <center>
                                                    <input type="submit" name="submit" id="submit" style="font-family: 'Arial', Helvetica, sans-serif;"> 
                                                    &nbsp;&nbsp;&nbsp; 
                                                    <input type="reset" name="reset" id="reset" style="font-family: 'Arial', Helvetica, sans-serif;"> 
                                                </center>
                                            </td>
                                        </tr>
                                     </table>
                                    </div>
                              </center>
                         </form>
