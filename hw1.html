<!-- english language -->
<html lang="en">
<!-- head section & css link -->
    <head>
        <link rel="stylesheet" href="hw1.css"> <!-- links to css file-->
        <title> New Patient Registry | Cat Medical </title>
    </head>
    <body>
        <header>
             <table width="100%">
                  <tr>
                    <td valign="top" align="left" width="20%">
                     <div class="image">
                         <img align="center" src="CatMedical.jpeg" alt="Cat Medical" width="70px" id="logo"/>
                     </div>
                     </td>

                    <td>
                      <h2>Cat Medical</h2> 
                    </td>

                    <td valign="bottom" align="right" width="20%">
                        <p>Today's Date: <span id="today"></span></p><!-- writes date-->
                    </td>
                </tr>
            </table>
        </header>
<hr>

<!-- Form Starts-->
<form action="thankyou.html">
    <center>
         <div class="format">
            <table>
                <tr>
                    <th colspan="4">Create Patient Portal Account</th>
                </tr>


                    <!-- Patient info section starts-->
                    <!-- Patient Name (F,M,L)-->
                     <tr>
    <td><label for="fname">First Name:</label></td>
    <td>
                    <input type="text" 
                    name="fname" 
                    id="fname" 
                    maxlength="30" (change)
                    title="Please enter your first name" 
                    required 
                    placeholder="Sydney"/>
                 </td>
                </tr>

               <tr>
                <td><label for="mname">Middle Initial:</label></td>
                 <td>
                    <input type="text" 
                    name="mname" 
                    id="mname" 
                    maxlength="1" (change)
                    title="Please enter your middle inital" 
                    required 
                    placeholder="R"/>
                 </td>
                </tr> 

                <tr>
                <td><label for="lname">Last Name:</label></td>
                 <td>
                    <input type="text" 
                    name="lname" 
                    id="lname" 
                    maxlength="30" (change)
                    title="Please enter your last name" 
                    required 
                    placeholder="Guico"
                    />
                 </td>
                </tr>

                <!-- Gender or Sex -->

                <tr>
                    <td> class= "td1"><label for= "psex">Patient's Sex </label></td>
                    <td>
                        <input 
                        type="radio" 
                        id="s1" 
                        name="psex" 
                        value="male"
                        /> 
                        Male
                        
                        <input 
                        type="radio" 
                        id="s2" 
                        name="psex" 
                        value="female"
                        /> 
                        Female

                        <input 
                        type="radio" 
                        id="s3" 
                        name="psex" 
                        value="I prefer not to say"
                        /> 
                        I prefer not to say             
                    </td>
                </tr>

                <!-- D.O.B-->
                 <tr>
            <td><label for="dob">Date of Birth:</label></td>
                <td>
                    <input 
                    type="date" 
                    id="dob" 
                    name="dob"
                    />
                 </td>
            </tr>

                <!-- SSN-->
            <tr>
                <td class="td1"><label for</td>">Phone Number:</label></td>
                <td>
                    <input type="text" 
                    name="phone" 
                    id="phone" 
                    pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" 
                    required 
                    title="Please enter phone number" 
                    placeholder="123-456-7890"/>
                </td>
        </tr>

        <tr>
		    <td><label for="phone">Phone Number:</label></td>
            <td>
            <input 
            type="text" 
            name="phone" 
            id="phone" 
            pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" 
            required 
            title="Please enter phone number" 
            placeholder="123-456-7890"/>
    </td>
</tr>
